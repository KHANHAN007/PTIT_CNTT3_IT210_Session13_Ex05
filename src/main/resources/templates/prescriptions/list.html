<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Danh sách Đơn thuốc</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            color: white !important;
        }
        .navbar-nav .nav-link {
            color: white !important;
            margin: 0 10px;
            border-radius: 5px;
        }
        .navbar-nav .nav-link:hover {
            background-color: rgba(255,255,255,0.2);
        }
        .card {
            border: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-radius: 8px;
        }
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 8px 8px 0 0;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .badge {
            border-radius: 20px;
            padding: 5px 10px;
        }
        table tbody tr:hover {
            background-color: #f8f9fa;
        }
        .search-box {
            background-color: #f8f9fa;
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            border: 1px solid #dee2e6;
        }
        .search-box .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Quản Lý Đơn Thuốc</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/prescriptions">Danh sách Đơn thuốc</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/prescriptions/new">Thêm Đơn thuốc</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="alert alert-success alert-dismissible fade show d-none" role="alert" id="successAlert">
            <strong>Thành công!</strong> <span id="successMessage"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="alert alert-danger alert-dismissible fade show d-none" role="alert" id="errorAlert">
            <strong>Lỗi!</strong> <span id="errorMessage"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Search Box -->
        <div class="search-box">
            <form method="GET" action="/prescriptions" class="d-flex gap-2 flex-wrap">
                <input type="text" name="patientCode" class="form-control flex-grow-1"
                       placeholder="Tìm kiếm theo mã bệnh nhân (ví dụ: BN001)"
                       th:value="${searchCode}">
                <button type="submit" class="btn btn-primary">
                    Tìm kiếm
                </button>
                <a href="/prescriptions" class="btn btn-secondary">
                    Xóa
                </a>
            </form>
        </div>

        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h4 class="mb-0" th:if="${#strings.isEmpty(searchCode)}">Danh sách Đơn thuốc</h4>
                <h4 class="mb-0" th:unless="${#strings.isEmpty(searchCode)}">
                    Kết quả tìm kiếm: <span class="badge bg-warning" th:text="${searchCode}"></span>
                </h4>
                <a href="/prescriptions/new" class="btn btn-light btn-sm">
                    Thêm mới
                </a>
            </div>
            <div class="card-body">
                <div th:if="${#lists.isEmpty(prescriptions)}" class="alert alert-info">
                    Hiện chưa có đơn thuốc nào. <a href="/prescriptions/new">Thêm đơn thuốc mới</a>
                </div>
                <div th:unless="${#lists.isEmpty(prescriptions)}" class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Mã BN</th>
                                <th>Tên Bệnh Nhân</th>
                                <th>Email</th>
                                <th>Ngày cấp phát</th>
                                <th>Số thuốc</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="prescription : ${prescriptions}">
                                <td th:text="${prescription.id}"></td>
                                <td>
                                    <span class="badge bg-primary" th:text="${prescription.patientCode}"></span>
                                </td>
                                <td th:text="${prescription.patientName}"></td>
                                <td th:text="${prescription.patientEmail}"></td>
                                <td th:text="${#temporals.format(prescription.issueDate, 'dd/MM/yyyy HH:mm')}"></td>
                                <td>
                                    <span class="badge bg-info" th:text="${prescription.medications.size()}"></span>
                                </td>
                                <td>
                                    <a th:href="@{/prescriptions/{id}(id=${prescription.id})}" class="btn btn-sm btn-info">Chi tiết</a>
                                    <a th:href="@{/prescriptions/{id}/delete(id=${prescription.id})}"
                                       class="btn btn-sm btn-danger"
                                       onclick="return confirm('Xác nhận xóa?')">Xóa</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <footer class="mt-5 py-4 bg-light text-center text-muted">
        <p>&copy; 2026 Quản Lý Đơn Thuốc - IT210 Session 13</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
