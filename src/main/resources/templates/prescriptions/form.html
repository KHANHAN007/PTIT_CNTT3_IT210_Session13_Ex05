<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Thêm Đơn thuốc</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            color: white !important;
        }
        .navbar-nav .nav-link {
            color: white !important;
            margin: 0 10px;
            border-radius: 5px;
        }
        .navbar-nav .nav-link:hover {
            background-color: rgba(255,255,255,0.2);
        }
        .card {
            border: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-radius: 8px;
        }
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 8px 8px 0 0;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .medication-form {
            background-color: #f8f9fa;
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            border: 2px dashed #dee2e6;
        }
        .medication-form input, .medication-form button {
            margin-bottom: 0.5rem;
        }
        .add-medication-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
        }
        .add-medication-btn:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }
        .remove-medication-btn {
            background-color: #dc3545;
        }
        .remove-medication-btn:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Quản Lý Đơn Thuốc</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/prescriptions">Danh sách Đơn thuốc</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/prescriptions/new">Thêm Đơn thuốc</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <!-- Error Alert -->
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <strong>⚠️ Lỗi!</strong> <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h4 class="mb-0">Thêm Đơn thuốc mới</h4>
                <a href="/prescriptions" class="btn btn-light btn-sm">Quay lại</a>
            </div>
            <div class="card-body">
                <form action="/prescriptions" method="POST" class="needs-validation" novalidate>
                    <!-- Chọn Bệnh nhân -->
                    <div class="mb-4">
                        <label for="patientId" class="form-label"><strong>Chọn Bệnh nhân</strong></label>
                        <select class="form-control" id="patientId" name="patientId" required>
                            <option value="">-- Chọn bệnh nhân --</option>
                            <option th:each="patient : ${patients}" th:value="${patient.id}"
                                    th:text="${patient.code} + ' - ' + ${patient.name}"></option>
                        </select>
                        <div class="invalid-feedback">Vui lòng chọn bệnh nhân</div>
                    </div>

                    <!-- Danh sách Thuốc -->
                    <div class="mb-4">
                        <h5 class="mb-3">Danh sách Thuốc</h5>
                        <div id="medicationsContainer">
                        </div>
                        <button type="button" class="btn add-medication-btn" onclick="addMedication()">
                            Thêm thuốc khác
                        </button>
                    </div>

                    <!-- Submit Button -->
                    <div class="text-end mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">
                            Lưu Đơn thuốc
                        </button>
                        <a href="/prescriptions" class="btn btn-secondary btn-lg">Hủy</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer class="mt-5 py-4 bg-light text-center text-muted">
        <p>&copy; 2026 Quản Lý Đơn Thuốc - IT210 Session 13</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let medicationCount = 0;

        function addMedication() {
            const container = document.getElementById('medicationsContainer');
            const index = medicationCount++;

            const medicationForm = document.createElement('div');
            medicationForm.className = 'medication-form';
            medicationForm.id = `medication-${index}`;
            medicationForm.innerHTML = `
                <div class="row">
                    <div class="col-md-4">
                        <label class="form-label">Tên thuốc</label>
                        <input type="text" class="form-control" name="medicationNames"
                               placeholder="Tên thuốc" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Số lượng (viên)</label>
                        <input type="number" class="form-control" name="medicationQuantities"
                               placeholder="Số lượng" min="1" required>
                        <small class="text-danger">Không được âm</small>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Giá (VNĐ)</label>
                        <input type="number" class="form-control" name="medicationPrices"
                               placeholder="Giá" step="0.01" min="0" required>
                    </div>
                </div>
                <button type="button" class="btn btn-sm remove-medication-btn" onclick="removeMedication(${index})">
                    Xóa
                </button>
            `;

            container.appendChild(medicationForm);
        }

        function removeMedication(index) {
            const element = document.getElementById(`medication-${index}`);
            if (element) {
                element.remove();
            }
        }

        // Add first medication form on page load
        document.addEventListener('DOMContentLoaded', function() {
            addMedication();

            const forms = document.querySelectorAll('.needs-validation');
            forms.forEach(form => {
                form.addEventListener('submit', function(event) {
                    if (form.checkValidity() === false) {
                        event.preventDefault();
                        event.stopPropagation();
                    }
                    form.classList.add('was-validated');
                }, false);
            });
        });
    </script>
</body>
</html>
