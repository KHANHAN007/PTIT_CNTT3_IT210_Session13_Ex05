<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lỗi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            color: white !important;
        }
        .error-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
        }
        .error-card {
            border: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-radius: 8px;
            max-width: 500px;
        }
        .error-card .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 8px 8px 0 0;
            text-align: center;
            padding: 2rem 1.5rem;
        }
        .error-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">🏥 Quản Lý Đơn Thuốc</a>
        </div>
    </nav>

    <div class="container error-container">
        <div class="error-card">
            <div class="card-header">
                <div class="error-icon">❌</div>
                <h2 class="mb-0">Đã xảy ra lỗi</h2>
            </div>
            <div class="card-body text-center py-5">
                <p class="text-danger" th:if="${errorMessage}" th:text="${errorMessage}">
                    Đã xảy ra một lỗi không mong muốn.
                </p>
                <p class="text-muted" th:unless="${errorMessage}">
                    Vui lòng thử lại hoặc liên hệ với quản trị viên.
                </p>
                <a href="/prescriptions" class="btn btn-primary mt-4">← Quay lại danh sách</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
